name: CI/CD Pipeline (Tests, Docker & APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  quality_and_tests:
    name: "🛡️ Quality & Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pubcache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pubcache-
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Create .env file for tests
        run: echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" > .env
      
      - name: Run code generators
        run: flutter pub run build_runner build --delete-conflicting-outputs
      
      - name: Verify formatting
        run: dart format --set-exit-if-changed --output=none .
      
      - name: Analyze code
        run: flutter analyze --fatal-infos --fatal-warnings
      
      - name: Run Flutter tests
        run: flutter test --no-pub

  build_publish_docker:
    name: "🐳 Build & Push Docker"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get Lowercase Name
        id: get_name
        shell: bash
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_NAME" >> $GITHUB_OUTPUT
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.get_name.outputs.repo_lc }}:latest
          build-args: |
            SENTRY_DSN_ARG=${{ secrets.SENTRY_DSN }}

  build_apk:
    name: "🏗️ Build Android APK"
    runs-on: ubuntu-latest
    needs: [quality_and_tests, build_publish_docker]
    if: success()
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Lowercase Name
        id: get_name
        shell: bash
        run: |
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lc=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks
      
      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties
      
      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build APK using Docker image
        run: |
          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ steps.get_name.outputs.repo_lc }}:latest"
          echo "Pulling image: $IMAGE_TAG"
          docker pull $IMAGE_TAG
          
          mkdir -p build
          chmod 777 build
          
          docker run --rm \
            -v "$PWD/build:/app/build" \
            -v "$PWD/android/key.properties:/app/android/key.properties" \
            -v "$PWD/android/app/upload-keystore.jks:/app/android/app/upload-keystore.jks" \
            -v "$PWD/android/app/google-services.json:/app/android/app/google-services.json" \
            $IMAGE_TAG
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

  status_report:
    name: "📢 Status Report"
    runs-on: ubuntu-latest
    needs: [quality_and_tests, build_publish_docker, build_apk]
    if: always()
    steps:
      - name: Check Workflow Status
        shell: bash
        run: |
          echo "📊 WORKFLOW SUMMARY"
          echo "--------------------------------"
          echo "🛡️ Tests:        ${{ needs.quality_and_tests.result }}"
          echo "🐳 Docker:       ${{ needs.build_publish_docker.result }}"
          echo "🏗️ APK Build:    ${{ needs.build_apk.result }}"
          echo "--------------------------------"
          
          if [ "${{ needs.quality_and_tests.result }}" == "failure" ] || \
             [ "${{ needs.build_publish_docker.result }}" == "failure" ] || \
             [ "${{ needs.build_apk.result }}" == "failure" ]; then
            echo "❌ The process has failed."
            exit 1
          else
            echo "✅ Everything went well."
          fi